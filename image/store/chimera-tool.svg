  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1831"/>
      <stop offset="100%" stop-color="#191f58"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8eb5ff"/>
      <stop offset="100%" stop-color="#7f78ff"/>
